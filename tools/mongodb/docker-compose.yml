version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 32767Getcoinn
      MONGO_INITDB_DATABASE: quikbin

    ports:
      - "27017:27017"

    volumes:
      - ./mongo_data:/data/db
      - ./init:/docker-entrypoint-initdb.d:ro

    command: ["mongod", "--auth"]
