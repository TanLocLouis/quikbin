version: '3.8'

services:
  frontend:
    image: node:lts
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3000

  backend:
    image: node:lts
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./app/node_modules
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development