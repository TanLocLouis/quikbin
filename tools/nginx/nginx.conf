events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # API rate limitter
    # 10 req/s
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

    # Frontend rate limitter
    # 10 req/s
    limit_req_zone $binary_remote_addr zone=frontlimit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            # Apply the frontend rate limit
            limit_req zone=frontlimit burst=20;
            
            try_files $uri /index.html;
        }
        # Exclude static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
            expires 30d;
            access_log off;
        }

        # API endpoints
        location /api/ {
            # Apply the backend rate limit
            limit_req zone=apilimit burst=5  nodelay;
            proxy_pass http://192.168.1.5:3002/api/;
        }
    }
}